events {
    worker_connections 1024;
}

http {
    upstream admin_backend {
        server admin-backend:8080;
    }

    upstream admin_frontend {
        server admin-frontend-dev:5173;
    }

    upstream school_backend {
        server school-backend:8080;
    }

    upstream school_frontend {
        server school-frontend-dev:5174;
    }

    # Admin panel - admin.localhost
    server {
        listen 80;
        server_name admin.localhost;

        # Admin frontend (Vite dev server)
        location / {
            proxy_pass http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Admin API
        location /api/ {
            proxy_pass http://admin_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin uploads
        location /uploads/ {
            alias /var/www/admin_uploads/;
        }
    }

    # School-specific subdomains - *.localhost
    server {
        listen 80;
        server_name ~^(?<school_id>[^.]+)\.localhost$;

        # School frontend (Vite dev server)
        location / {
            proxy_pass http://school_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-ID $school_id;
            
            # WebSocket support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # School API
        location /api/ {
            proxy_pass http://school_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-ID $school_id;
        }

        # School uploads
        location /uploads/ {
            alias /var/www/uploads/;
        }
    }
}




