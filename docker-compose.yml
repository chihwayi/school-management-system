services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: school_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_management_system
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --max-connections=1000 --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s
    networks:
      - school_network

  # School Management System Backend (Port 8080)
  school-backend:
    build:
      context: ./school-management-system
      dockerfile: Dockerfile
    container_name: school_backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 30s
      retries: 10
      interval: 10s
      start_period: 60s
    networks:
      - school_network

  # School Management System Frontend (Port 3000)
  school-frontend:
    image: node:20-alpine
    container_name: school_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./school-management-frontend:/app
      - school_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    command: >
      sh -c "
        echo 'Installing dependencies...' &&
        npm install &&
        echo 'Starting development server...' &&
        npm run dev -- --host 0.0.0.0 --port 3000
      "
    depends_on:
      school-backend:
        condition: service_healthy
    networks:
      - school_network

  # Admin Panel Backend (Port 8081)
  admin-backend:
    build: 
      context: ./multi-tenant/admin-panel/backend
      dockerfile: Dockerfile
    container_name: admin_backend
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      timeout: 30s
      retries: 10
      interval: 10s
      start_period: 60s
    networks:
      - school_network

  # Admin Panel Frontend (Port 5173)
  admin-frontend:
    image: node:20-alpine
    container_name: admin_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./multi-tenant/admin-panel/frontend:/app
      - admin_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8081/api
    command: >
      sh -c "
        echo 'Installing dependencies...' &&
        npm install &&
        echo 'Starting development server...' &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    depends_on:
      admin-backend:
        condition: service_healthy
    networks:
      - school_network

  # Nginx for routing
  nginx:
    image: nginx:alpine
    container_name: school_nginx
    ports:
      - "8000:80"
    volumes:
      - ./multi-tenant/shared/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads
    networks:
      - school_network

volumes:
  mysql_data:
  admin_node_modules:
  school_node_modules:
  uploads:

networks:
  school_network:
    driver: bridge
